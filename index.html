<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MiniApp Store</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.header{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.balance{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:20px;
font-size:18px;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
padding:18px;
border-radius:14px;
color:white;
position:relative;
box-shadow:0 6px 14px rgba(0,0,0,0.4);
}

.orange{background:#fb923c;}
.purple{background:#a855f7;}
.green{background:#22c55e;}

.brand{
font-size:14px;
opacity:0.9;
}

.title{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.price{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

.old{
text-decoration:line-through;
opacity:0.8;
font-size:14px;
}

.stock{
position:absolute;
top:10px;
right:10px;
background:white;
color:black;
font-size:12px;
padding:4px 8px;
border-radius:6px;
font-weight:bold;
}

.buy{
margin-top:15px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
font-weight:bold;
cursor:pointer;
}

.buy:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="header">🛒 Mağaza</div>

<div class="balance">
Bakiye: <span id="balance">0</span> ₺
</div>

<div class="products" id="products"></div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

let user_id = 1

if(tg.initDataUnsafe?.user?.id){
user_id = tg.initDataUnsafe.user.id
}


// BAKİYE
fetch("https://API-URL/balance/" + user_id)
.then(r=>r.json())
.then(data=>{
document.getElementById("balance").innerText = data.balance
})


// ÜRÜNLER
fetch("https://API-URL/products")
.then(r=>r.json())
.then(products=>{

let html=""

products.forEach(p=>{

let color="orange"

if(p.code=="market") color="green"
if(p.code=="yemek2") color="purple"

html+=`
<div class="card ${color}">

<div class="stock">STOK VAR</div>

<div class="brand">${p.code.toUpperCase()}</div>

<div class="title">${p.name}</div>

<div class="price">
${p.price} ₺
</div>

<button class="buy" onclick="buy('${p.code}')">
SATIN AL
</button>

</div>
`

})

document.getElementById("products").innerHTML = html

})


function buy(code){

fetch("https://API-URL/buy",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user_id,
product:code
})
})
.then(r=>r.json())
.then(res=>{

if(res.error){

alert("❌ Yetersiz bakiye")

}else{

alert("✅ Satın alma başarılı")

location.reload()

}

})

}

</script>

</body>
</html>
